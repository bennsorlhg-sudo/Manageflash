openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Flash Net Network Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management operations
  - name: network
    description: Network points operations
  - name: dashboard
    description: Owner dashboard
  - name: custody
    description: Custody management
  - name: tasks
    description: Task assignment
  - name: finances
    description: Financial reports
  - name: import
    description: Data import operations
  - name: fieldTasks
    description: Field engineer task operations
  - name: salesPoints
    description: Sales points management
  - name: loans
    description: Loans and debts management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (Owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateUser
      tags: [users]
      summary: Update a user (Owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/toggle-active:
    post:
      operationId: toggleUserActive
      tags: [users]
      summary: Activate or deactivate a user (Owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User activation status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /network/hotspot-points:
    get:
      operationId: listHotspotPoints
      tags: [network]
      summary: List hotspot points
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of hotspot points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HotspotPoint"

  /network/broadband-points:
    get:
      operationId: listBroadbandPoints
      tags: [network]
      summary: List broadband points
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of broadband points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BroadbandPoint"

  /network/sales-points:
    get:
      operationId: listNetworkSalesPoints
      tags: [network]
      summary: List network sales points
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sales points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesPoint"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get owner dashboard summary
      description: Returns key metrics for the owner dashboard
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /custody:
    post:
      operationId: createCustody
      tags: [custody]
      summary: Add custody to Finance Manager
      description: Owner adds cash or card custody to Finance Manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustodyRequest"
      responses:
        "201":
          description: Custody created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustodyRecord"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getCustodyRecords
      tags: [custody]
      summary: Get custody records
      responses:
        "200":
          description: List of custody records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustodyRecord"

  /tasks:
    post:
      operationId: createTask
      tags: [tasks]
      summary: Assign a task to a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get all tasks
      parameters:
        - name: targetRole
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /finances/report:
    get:
      operationId: getFinancialReport
      tags: [finances]
      summary: Get financial report (sales, expenses, profit)
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, custom]
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Financial report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialReport"

  /import/hotspot:
    post:
      operationId: importHotspotCards
      tags: [import]
      summary: Import hotspot cards in bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportHotspotRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /import/broadband:
    post:
      operationId: importBroadbandCards
      tags: [import]
      summary: Import broadband cards in bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportBroadbandRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /import/sales-points:
    post:
      operationId: importSalesPoints
      tags: [import]
      summary: Import sales points in bulk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportSalesPointsRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /card-prices:
    get:
      operationId: getCardPrices
      tags: [dashboard]
      summary: Get card denomination prices
      responses:
        "200":
          description: Card prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardPrices"

  /field-tasks:
    get:
      operationId: listFieldTasks
      tags: [fieldTasks]
      summary: List field engineer tasks
      description: Returns a list of field tasks optionally filtered by status or engineer
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [new, in_progress, completed]
        - name: engineerName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of field tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldTask"
    post:
      operationId: createFieldTask
      tags: [fieldTasks]
      summary: Create a new field task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFieldTaskRequest"
      responses:
        "201":
          description: Field task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldTask"

  /field-tasks/{id}:
    get:
      operationId: getFieldTask
      tags: [fieldTasks]
      summary: Get a field task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Field task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldTask"
        "404":
          description: Field task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFieldTask
      tags: [fieldTasks]
      summary: Update a field task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFieldTaskRequest"
      responses:
        "200":
          description: Updated field task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldTask"
        "404":
          description: Field task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /field-tasks/{id}/start:
    post:
      operationId: startFieldTask
      tags: [fieldTasks]
      summary: Start field task execution (move to in_progress)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Field task started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldTask"
        "404":
          description: Field task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /field-tasks/{id}/complete:
    post:
      operationId: completeFieldTask
      tags: [fieldTasks]
      summary: Complete a field task (move to completed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteFieldTaskRequest"
      responses:
        "200":
          description: Field task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldTask"
        "404":
          description: Field task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-points:
    get:
      operationId: listSalesPoints
      tags: [salesPoints]
      summary: List all sales points
      responses:
        "200":
          description: List of sales points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesPoint"
    post:
      operationId: createSalesPoint
      tags: [salesPoints]
      summary: Create a new sales point
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesPointRequest"
      responses:
        "201":
          description: Sales point created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesPoint"

  /sales-points/{id}:
    get:
      operationId: getSalesPoint
      tags: [salesPoints]
      summary: Get a sales point by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sales point details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesPoint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSalesPoint
      tags: [salesPoints]
      summary: Update a sales point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesPointRequest"
      responses:
        "200":
          description: Updated sales point
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesPoint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales-points/{id}/loans:
    get:
      operationId: listSalesPointLoans
      tags: [loans]
      summary: List loans for a sales point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loan"
    post:
      operationId: createLoan
      tags: [loans]
      summary: Record a new loan for a sales point
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLoanRequest"
      responses:
        "201":
          description: Loan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loan"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: string
      required:
        - error

    LoginRequest:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required:
        - phone
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [owner, finance_manager, supervisor, tech_engineer]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - role
        - isActive
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [finance_manager, supervisor, tech_engineer]
      required:
        - name
        - phone
        - password
        - role

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [finance_manager, supervisor, tech_engineer]

    HotspotPoint:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [active, active_incomplete, ready, empty, stopped]
        supervisorId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - location
        - status
        - createdAt

    BroadbandPoint:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [active, active_incomplete, ready, empty, stopped]
        supervisorId:
          type: integer
          nullable: true
        speed:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - location
        - status
        - createdAt

    SalesPoint:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ownerName:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        location:
          type: string
        oldDebt:
          type: string
          nullable: true
          description: "Read-only reference field. Never modified by system actions."
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - location
        - createdAt
        - updatedAt

    DashboardSummary:
      type: object
      properties:
        ownerName:
          type: string
        cashBalance:
          type: number
        totalCustody:
          type: number
        totalLoans:
          type: number
        totalCardValue:
          type: number
        totalSalesPoints:
          type: integer
        hotspotCount:
          type: integer
        broadbandCount:
          type: integer
      required:
        - ownerName
        - cashBalance
        - totalCustody
        - totalLoans
        - totalCardValue
        - totalSalesPoints
        - hotspotCount
        - broadbandCount

    CreateCustodyRequest:
      type: object
      properties:
        type:
          type: string
          enum: [cash, cards]
        amount:
          type: number
        denomination:
          type: integer
        cardCount:
          type: integer
        toRole:
          type: string
          enum: [finance_manager, supervisor, tech_engineer]
        toPersonName:
          type: string
        notes:
          type: string
      required:
        - type
        - toRole

    CustodyRecord:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: string
        denomination:
          type: integer
          nullable: true
        cardCount:
          type: integer
          nullable: true
        fromRole:
          type: string
        toRole:
          type: string
        toPersonName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - type
        - amount
        - fromRole
        - toRole
        - createdAt

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        targetRole:
          type: string
          enum: [finance_manager, supervisor, tech_engineer]
        targetPersonName:
          type: string
      required:
        - title
        - description
        - targetRole

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        targetRole:
          type: string
        targetPersonName:
          type: string
          nullable: true
        assignedByRole:
          type: string
        status:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - description
        - targetRole
        - assignedByRole
        - status
        - createdAt
        - updatedAt

    FinancialReport:
      type: object
      properties:
        period:
          type: string
        from:
          type: string
        to:
          type: string
        totalSales:
          type: number
        totalExpenses:
          type: number
        profit:
          type: number
        salesBreakdown:
          type: object
          properties:
            hotspot:
              type: number
            broadband:
              type: number
          required:
            - hotspot
            - broadband
        expenseBreakdown:
          type: object
          properties:
            operational:
              type: number
            salary:
              type: number
            other:
              type: number
          required:
            - operational
            - salary
            - other
      required:
        - period
        - from
        - to
        - totalSales
        - totalExpenses
        - profit
        - salesBreakdown
        - expenseBreakdown

    ImportHotspotRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/HotspotCardRecord"
      required:
        - records

    HotspotCardRecord:
      type: object
      properties:
        serial:
          type: string
        denomination:
          type: integer
        batchNumber:
          type: string
        status:
          type: string
      required:
        - serial
        - denomination

    ImportBroadbandRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/BroadbandCardRecord"
      required:
        - records

    BroadbandCardRecord:
      type: object
      properties:
        serial:
          type: string
        denomination:
          type: integer
        batchNumber:
          type: string
        status:
          type: string
      required:
        - serial
        - denomination

    ImportSalesPointsRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/SalesPointRecord"
      required:
        - records

    SalesPointRecord:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        contactName:
          type: string
        contactPhone:
          type: string
        status:
          type: string
      required:
        - name

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
